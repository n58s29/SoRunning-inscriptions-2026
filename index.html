<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenge Connecté 2026</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .home-page {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 72px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ─── Cartes utilisateur ─── */
    .user-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .user-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 32px 20px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    .user-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(247, 115, 180, 0.15);
    }
    .user-card--locked {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }
    .user-card-icon {
      font-size: 40px;
      line-height: 1;
      margin-bottom: 14px;
    }
    .user-card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .user-card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .user-card-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 13px;
      line-height: 1;
    }

    /* ─── Séparateur organisateurs ─── */
    .admin-separator {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .admin-separator::before,
    .admin-separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── Cartes admin ─── */
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .admin-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      transition: border-color 0.2s, color 0.2s;
    }
    .admin-card:hover {
      border-color: var(--muted);
      color: var(--text);
    }
    .admin-card-icon { font-size: 18px; flex-shrink: 0; }

    @media (max-width: 480px) {
      .user-grid  { grid-template-columns: 1fr; }
      .admin-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="logo">
    <img class="logo-img" src="logo.png" alt="CC"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
    <div class="logo-badge" style="display:none;">CC</div>
    <div class="logo-text">Challenge <span>Connecté</span> 2026</div>
  </div>
  <div class="header-right">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"
            title="Basculer mode clair / sombre">
      <span class="theme-toggle-icon" id="themeIcon">🌙</span>
    </button>
  </div>
</header>

<!-- ═══ CONTENU ═══ -->
<div class="home-page">

  <!-- Cartes participants -->
  <div class="user-grid">

    <a href="verify.html" class="user-card">
      <div class="user-card-icon">🔍</div>
      <div class="user-card-title">Vérifier mon inscription</div>
      <div class="user-card-desc">Confirmez votre participation et retrouvez vos informations</div>
    </a>

    <a href="depot.html" class="user-card" id="card-depot">
      <div class="user-card-icon">📤</div>
      <div class="user-card-title">Déposer ma preuve</div>
      <div class="user-card-desc">Soumettez votre temps et votre preuve après la course</div>
    </a>

  </div>

  <!-- Séparateur -->
  <div class="admin-separator">🔒 Espace organisateurs</div>

  <!-- Cartes admin -->
  <div class="admin-grid">

    <a href="admin.html" class="admin-card">
      <span class="admin-card-icon">⚙️</span>
      <span>Administration</span>
    </a>

    <a href="resultats.html" class="admin-card" id="card-resultats">
      <span class="admin-card-icon">🏆</span>
      <span>Résultats</span>
    </a>

  </div>

</div>

<script>
/* ─── THÈME ─── */
const THEME_KEY = 'challenge2026_theme';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.textContent = t === 'light' ? '☀️' : '🌙';
  localStorage.setItem(THEME_KEY, t);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
(function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) applyTheme(saved);
  else if (window.matchMedia?.('(prefers-color-scheme: light)').matches) applyTheme('light');
  else applyTheme('dark');
})();

/* ─── CONFIG ─── */
(async function() {
  let cfg;
  try {
    const res = await fetch('./config.json?t=' + Date.now());
    if (!res.ok) return;
    cfg = await res.json();
  } catch { return; }

  if (!cfg.depotOpen) {
    const card = document.getElementById('card-depot');
    card.removeAttribute('href');
    card.classList.add('user-card--locked');
    const badge = document.createElement('div');
    badge.className = 'user-card-badge';
    badge.textContent = '🔒';
    card.insertBefore(badge, card.firstChild);
  }

  if (!cfg.resultatsOpen) {
    const card = document.getElementById('card-resultats');
    card.removeAttribute('href');
    card.style.opacity = '0.4';
    card.style.cursor = 'not-allowed';
    card.style.pointerEvents = 'none';
  }
})();
</script>

</body>
</html>
