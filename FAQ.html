<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ — Challenge Connecté 2026</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .doc-page {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .doc-header {
      text-align: center;
      padding: 32px 0 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }
    .doc-header-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .doc-header-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 40px;
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 10px;
    }
    .doc-header-sub {
      font-size: 15px;
      color: var(--muted);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 32px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img class="logo-img" src="logo.png" alt="CC"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
    <div class="logo-badge" style="display:none;">CC</div>
    <div class="logo-text">Challenge <span>Connecté</span> 2026</div>
  </div>
  <div class="header-right">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"
            title="Basculer mode clair / sombre">
      <span class="theme-toggle-icon" id="themeIcon">🌙</span>
    </button>
  </div>
</header>

<div class="doc-page">

  <a href="index.html" class="back-link">← Retour à l'accueil</a>

  <div class="doc-header">
    <div class="doc-header-label">❓ Questions fréquentes</div>
    <h1 class="doc-header-title">FAQ</h1>
    <p class="doc-header-sub">Challenge Connecté 2026 — SoRunning SNCF</p>
  </div>

  <!-- Contenu à venir -->

</div>

<footer class="site-footer">
  <span>© 2026 Challenge Connecté — SoRunning SNCF</span>
  <span class="site-footer-sep">|</span>
  <a href="reglement.html">Règlement</a>
  <span class="site-footer-sep">|</span>
  <a href="cgu.html">CGU & Confidentialité</a>
  <span class="site-footer-sep">|</span>
  <a href="mailto:sorunningsncf@sncf.fr">sorunningsncf@sncf.fr</a>
</footer>

<script>
const THEME_KEY = 'challenge2026_theme';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.textContent = t === 'light' ? '☀️' : '🌙';
  localStorage.setItem(THEME_KEY, t);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
(function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) applyTheme(saved);
  else if (window.matchMedia?.('(prefers-color-scheme: light)').matches) applyTheme('light');
  else applyTheme('dark');
})();
</script>

</body>
</html>
