<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>🩷 La Vie en Rose - Dépôt de preuve 🩷</title>
  <script async src="https://tally.so/widgets/embed.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    body.tally-fullpage { margin: 0; height: 100%; overflow: hidden; }
    html.tally-fullpage { height: 100%; overflow: hidden; }
    #tallyFrame {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      border: 0; width: 100%; height: 100%;
    }

  </style>
</head>
<body>

<!-- ═══ PAS ENCORE DISPONIBLE (affiché par défaut, masqué si ouvert) ═══ -->
<div id="lockedView">

  <header>
    <div class="logo">
      <img class="logo-img" src="logo.png" alt="CC"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
      <div class="logo-badge" style="display:none;">CC</div>
      <div class="logo-text">Challenge <span>Connecté</span> 2026</div>
    </div>
    <div class="header-right">
      <a href="index.html" class="btn-back">← Accueil</a>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"
              title="Basculer mode clair / sombre">
        <span class="theme-toggle-icon" id="themeIcon">🌙</span>
      </button>
    </div>
  </header>

  <div class="verify-page">
    <div class="verify-hero">
      <div class="verify-hero-icon">🔒</div>
      <h1 class="verify-hero-title">Pas encore disponible</h1>
      <p class="verify-hero-sub">
        Cette section ouvrira après le jour de la course.<br>
        Revenez ici pour déposer votre preuve de participation.
      </p>
    </div>
  </div>

</div>

<!-- ═══ BOUTON RETOUR overlay (pleine page Tally) ═══ -->
<a id="backBtn" href="index.html" class="btn-back btn-back--fixed" style="display:none;">← Accueil</a>

<!-- ═══ FORMULAIRE TALLY pleine page ═══ -->
<iframe
  id="tallyFrame"
  data-tally-src="https://tally.so/r/KYJJOM"
  width="100%" height="100%"
  frameborder="0" marginheight="0" marginwidth="0"
  title="🩷 La Vie en Rose - Dépôt de preuve 🩷"
  style="display:none;"
></iframe>

<script>
/* ─── THÈME ─── */
const THEME_KEY = 'challenge2026_theme';
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.textContent = t === 'light' ? '☀️' : '🌙';
  localStorage.setItem(THEME_KEY, t);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
(function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) applyTheme(saved);
  else if (window.matchMedia?.('(prefers-color-scheme: light)').matches) applyTheme('light');
  else applyTheme('dark');
})();

/* ─── CONFIG ─── */
(async function() {
  let open = false;
  try {
    const res = await fetch('./config.json?t=' + Date.now());
    if (res.ok) open = !!(await res.json()).depotOpen;
  } catch {}

  if (open) {
    document.getElementById('lockedView').style.display = 'none';
    document.getElementById('tallyFrame').style.display = 'block';
    document.getElementById('backBtn').style.display = 'inline-flex';
    document.documentElement.classList.add('tally-fullpage');
    document.body.classList.add('tally-fullpage');
  }
})();

</script>

</body>
</html>
